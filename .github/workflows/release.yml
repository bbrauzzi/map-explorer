name: Release

# Manual "ship it" signal. CI (ci.yml) stays the per-PR/per-push correctness gate;
# this workflow is triggered by hand from the Actions tab when you want to release.
#
# The version is NOT entered here — package.json is the single source of truth. Bump it
# in a normal reviewed PR (`npm version <x.y.z> --no-git-tag-version`), then dispatch this.
on:
  workflow_dispatch:

# Least privilege by default; each job widens only what it needs.
permissions:
  contents: read

# Never cancel an in-flight release.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Re-run the full gate (a manual dispatch can target any ref, not just a CI'd commit),
  # then build and upload the Pages artifact.
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Tag the released commit and cut a GitHub Release. The version comes from package.json
  # (the source of truth), so the tag can never drift from the declared version. Idempotent:
  # re-dispatching against an existing version skips cleanly instead of erroring.
  tag-and-release:
    name: Tag & GitHub Release
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="v$(node -p "require('./package.json').version")"
          if ! [[ "$VER" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version '$VER' is not a valid release tag (vX.Y.Z)." >&2
            exit 1
          fi
          if gh release view "$VER" >/dev/null 2>&1; then
            echo "Release $VER already exists — skipping. Bump package.json to cut a new one."
            exit 0
          fi
          gh release create "$VER" \
            --target "${{ github.sha }}" \
            --title "$VER" \
            --generate-notes

  # Promote the released state to production by merging develop into main directly.
  # Uses the merges API: idempotent (204 when main is already up to date), 409 on conflict.
  merge-to-main:
    name: Merge develop -> main
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Merge develop into main
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          status=$(gh api -X POST "repos/$REPO/merges" \
            -f base=main -f head=develop \
            -f commit_message="Release $VERSION: merge develop into main" \
            --silent -w '%{http_code}' -o /dev/null 2>/dev/null) || true

          case "$status" in
            201) echo "Merged develop into main." ;;
            204) echo "main is already up to date with develop — nothing to merge." ;;
            409) echo "Merge conflict between develop and main — resolve manually." >&2; exit 1 ;;
            *)   echo "Unexpected response ($status) from merges API." >&2; exit 1 ;;
          esac
